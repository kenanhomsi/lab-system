# اسم الـ workflow الذي سيظهر في واجهة GitHub Actions
name: Deploy to Hostinger VPS

# متى يتم تشغيل هذا الـ pipeline؟
on:
  push:
    branches: ["main"] # يتشغل عندما تدفع تغييرات إلى فرع main
  # يمكنك إضافة (workflow_dispatch) لتشغيله يدوياً من واجهة GitHub
  workflow_dispatch:

# المهام (jobs) التي ستنفذ – نحدد مهمة واحدة اسمها "deploy"
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Get the latest code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            kenahomsi/lab-system-front:latest
            kenahomsi/lab-system-front:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_NEXTAUTH_URL=${{ secrets.NEXT_PUBLIC_NEXTAUTH_URL }}
            NEXT_PUBLIC_FRONTEND_URL=${{ secrets.NEXT_PUBLIC_FRONTEND_URL }}
            NEXT_PUBLIC_CKEDITOR_LICENSE_KEY=${{ secrets.NEXT_PUBLIC_CKEDITOR_LICENSE_KEY }}
            NEXT_PUBLIC_VERSION=${{ secrets.NEXT_PUBLIC_VERSION }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/lab-system-front
            git pull --ff-only origin main
            docker compose down --remove-orphans
            docker compose build --pull web
            docker compose up -d web
            docker image prune -f
