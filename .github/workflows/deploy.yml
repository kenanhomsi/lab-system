# اسم الـ workflow الذي سيظهر في واجهة GitHub Actions
name: Deploy to Hostinger VPS

# متى يتم تشغيل هذا الـ pipeline؟
on:
  push:
    branches: ["main"] # يتشغل عندما تدفع تغييرات إلى فرع main
  # يمكنك إضافة (workflow_dispatch) لتشغيله يدوياً من واجهة GitHub
  workflow_dispatch:

# المهام (jobs) التي ستنفذ – نحدد مهمة واحدة اسمها "deploy"
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Get the latest code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            kenahomsi/lab-system-front:latest
            kenahomsi/lab-system-front:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_NEXTAUTH_URL=${{ secrets.NEXT_PUBLIC_NEXTAUTH_URL }}
            NEXT_PUBLIC_FRONTEND_URL=${{ secrets.NEXT_PUBLIC_FRONTEND_URL }}
            NEXT_PUBLIC_CKEDITOR_LICENSE_KEY=${{ secrets.NEXT_PUBLIC_CKEDITOR_LICENSE_KEY }}
            NEXT_PUBLIC_VERSION=${{ secrets.NEXT_PUBLIC_VERSION }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.yml"
          target: "/home/lab-system-front"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          envs: APP_IMAGE_TAG,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e
            cd /home/lab-system-front
            export APP_IMAGE_TAG='${{ github.sha }}'
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: Neither 'docker compose' (v2) nor 'docker-compose' (v1) is installed on the VPS." >&2
              exit 1
            fi
            echo "Using compose command: $DC"
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
            $DC pull web
            $DC up -d --force-recreate --remove-orphans web
            docker image prune -f
