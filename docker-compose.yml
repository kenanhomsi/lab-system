# NEXT_PUBLIC_* build args are inlined at image build; run: docker compose build --no-cache web after changing them.
services:
  web:
    image: kenahomsi/lab-system-front:${APP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:?NEXT_PUBLIC_BASE_URL is required (e.g. https://syrian-medical.tech)}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?NEXT_PUBLIC_BACKEND_URL is required (e.g. https://api.syrian-medical.tech)}
        NEXT_PUBLIC_NEXTAUTH_URL: ${NEXT_PUBLIC_NEXTAUTH_URL:?NEXT_PUBLIC_NEXTAUTH_URL is required (e.g. https://syrian-medical.tech)}
        NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-https://syrian-medical.tech/api}
        NEXT_PUBLIC_CKEDITOR_LICENSE_KEY: ${NEXT_PUBLIC_CKEDITOR_LICENSE_KEY:-}
        NEXT_PUBLIC_VERSION: ${NEXT_PUBLIC_VERSION:-1.0.0}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      UPSTREAM_BACKEND_READY: ${UPSTREAM_BACKEND_READY:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
